<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo SaaS</title>
</head>
<body>
    <h1>ToDo List</h1>
    <form action="{{ url_for('add_task') }}" method="post">
        <input type="text" name="title" placeholder="New task" required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for task in tasks %}
        <li>{{ task.title }} <a href="{{ url_for('delete_task', task_id=task.id) }}">Delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
